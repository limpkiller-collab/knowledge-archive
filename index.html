<!DOCTYPE html>
<html lang="ko" id="htmlRoot" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지식 Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    /* ============================
       DESIGN TOKENS — Obsidian Curator
       ============================ */
    :root {
      --bg:              #0e0e0e;
      --surface-low:     #131313;
      --surface-mid:     #1a1919;
      --surface-high:    #201f1f;
      --surface-highest: #262626;
      --surface-bright:  #2c2c2c;
      --primary:         #85adff;
      --primary-fixed:   #6e9fff;
      --on-primary-fixed:#000000;
      --secondary:       #69f6b8;
      --tertiary:        #ff6f7e;
      --on-surface:      #ffffff;
      --on-surface-v:    #adaaaa;
      --outline-v:       #494847;
      --border:          rgba(255,255,255,0.05);
      --text:            #ffffff;
      --text-sec:        #adaaaa;
      --accent:          #6e9fff;
    }
    html.theme-light {
      --bg:              #FAFAFA;
      --surface-low:     #FFFFFF;
      --surface-mid:     #F9FAFB;
      --surface-high:    #FFFFFF;
      --surface-highest: #F3F4F6;
      --surface-bright:  #FFFFFF;
      --primary:         #2563EB;
      --primary-fixed:   #2563EB;
      --on-primary-fixed:#FFFFFF;
      --secondary:       #059669;
      --tertiary:        #E11D48;
      --on-surface:      #111827;
      --on-surface-v:    #4B5563;
      --outline-v:       #E0E0E0;
      --border:          rgba(0,0,0,0.06);
      --text:            #111827;
      --text-sec:        #4B5563;
      --accent:          #2563EB;
    }

    /* ============================
       RESET & BASE
       ============================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      line-height: 1; display: inline-block; vertical-align: middle;
      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
    }
    .fill-icon { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

    body {
      font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
      letter-spacing: -0.011em; min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ============================
       TOP APP BAR
       ============================ */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 64px;
      background: color-mix(in srgb, var(--bg), transparent 30%);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 0 40px -10px color-mix(in srgb, var(--primary), transparent 85%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; gap: 16px;
    }
    .topbar-brand {
      font-size: 17px; font-weight: 900; letter-spacing: -0.03em;
      color: var(--on-surface); white-space: nowrap; flex-shrink: 0;
    }
    .topbar-search {
      flex: 1; max-width: 400px;
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-highest);
      border: 1px solid var(--outline-v);
      border-radius: 99px; padding: 8px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .topbar-search:focus-within {
      border-color: var(--primary-fixed);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary), transparent 80%);
    }
    .topbar-search input {
      background: transparent; border: none; outline: none;
      font-size: 14px; font-family: inherit; color: var(--text);
      width: 100%;
    }
    .topbar-search input::placeholder { color: var(--text-sec); }
    .topbar-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: transparent;
      color: var(--text-sec); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; font-size: 20px;
    }
    .icon-btn:hover { background: var(--surface-high); color: var(--on-surface); }

    /* ============================
       SIDEBAR
       ============================ */
    .sidebar {
      position: fixed; top: 64px; left: 0; bottom: 0;
      width: 240px; z-index: 90;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: none;
      flex-direction: column;
      padding: 20px 12px;
      overflow-y: auto;
    }
    @media (min-width: 1024px) { .sidebar { display: flex; } }

    .sidebar-section-label {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-sec); padding: 0 10px; margin-bottom: 6px;
    }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .sidebar-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px;
      border: none; background: transparent;
      color: var(--text-sec); font-size: 13.5px; font-family: inherit;
      cursor: pointer; text-align: left;
      transition: background 0.15s, color 0.15s;
      width: 100%;
    }
    .sidebar-nav-item:hover { background: var(--surface-low); color: var(--on-surface); }
    .sidebar-nav-item.active {
      background: var(--surface-low);
      color: var(--on-surface); font-weight: 600;
      border-right: 2px solid var(--primary-fixed);
    }
    .sidebar-nav-item .nav-icon { font-size: 18px; flex-shrink: 0; }
    .sidebar-nav-item .nav-label { flex: 1; }
    .sidebar-nav-item .nav-count {
      font-size: 11px; font-weight: 700;
      background: var(--surface-highest); color: var(--text-sec);
      padding: 1px 6px; border-radius: 99px;
      min-width: 20px; text-align: center;
    }
    .sidebar-nav-item.active .nav-count {
      background: color-mix(in srgb, var(--primary-fixed), transparent 85%);
      color: var(--primary-fixed);
    }

    .sidebar-status {
      margin-top: auto; margin-bottom: 80px;
      background: var(--surface-mid);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
    }
    .sidebar-status-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--primary-fixed); margin-bottom: 8px;
    }
    .sidebar-status-text { font-size: 12px; color: var(--text-sec); line-height: 1.5; }
    .progress-bar-wrap {
      height: 4px; background: var(--surface-highest);
      border-radius: 99px; overflow: hidden; margin-top: 10px;
    }
    .progress-bar-fill {
      height: 100%; background: var(--primary-fixed);
      border-radius: 99px;
      box-shadow: 0 0 10px color-mix(in srgb, var(--primary), transparent 60%);
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }

    /* ============================
       MAIN CONTENT
       ============================ */
    .main-content {
      padding-top: 64px;
      padding-bottom: 96px;
    }
    @media (min-width: 1024px) { .main-content { margin-left: 240px; } }

    .content-inner {
      max-width: 960px; margin: 0 auto;
      padding: 32px 24px 40px;
    }
    @media (max-width: 640px) { .content-inner { padding: 24px 16px 40px; } }

    /* ============================
       HERO SECTION
       ============================ */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px; margin-bottom: 32px;
    }
    @media (min-width: 640px) { .hero-grid { grid-template-columns: 1.6fr 1fr; } }

    .hero-card {
      background: var(--surface-low);
      border-radius: 16px; padding: 28px;
      position: relative; overflow: hidden;
    }
    .hero-glow {
      position: absolute; top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: color-mix(in srgb, var(--primary), transparent 93%);
      filter: blur(80px); pointer-events: none;
    }
    .hero-title {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 900; letter-spacing: -0.03em; line-height: 1.1;
      margin-bottom: 8px; position: relative; z-index: 1;
    }
    .hero-sub { font-size: 13px; color: var(--text-sec); margin-bottom: 24px; position: relative; z-index: 1; }
    .hero-progress-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--primary-fixed); margin-bottom: 4px;
    }
    .hero-progress-nums { font-size: 13px; font-weight: 700; float: right; }
    .hero-stat-card {
      background: var(--surface-high);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .hero-stat-top-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-sec); margin-bottom: 12px;
    }
    .hero-latest-row { display: flex; align-items: flex-start; gap: 10px; }
    .hero-latest-icon {
      width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
      background: color-mix(in srgb, var(--tertiary), transparent 85%);
      display: flex; align-items: center; justify-content: center;
      color: var(--tertiary); font-size: 18px;
    }
    .hero-latest-title { font-weight: 700; font-size: 13px; line-height: 1.4; }
    .hero-latest-date { font-size: 11px; color: var(--text-sec); margin-top: 3px; }
    .hero-bottom-row {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 16px; margin-top: 16px;
      border-top: 1px solid var(--border);
    }
    .hero-total-num { font-size: 28px; font-weight: 900; }
    .hero-total-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-sec); }
    .shuffle-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--outline-v); background: transparent;
      color: var(--text-sec); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .shuffle-btn:hover { border-color: var(--primary-fixed); color: var(--primary-fixed); }

    /* ============================
       FILTER AREA
       ============================ */
    .filter-section { margin-bottom: 24px; }
    .filter-row {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap; margin-bottom: 8px;
    }
    .filter-label {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-sec); margin-right: 2px; flex-shrink: 0;
    }
    .filter-chip {
      padding: 4px 12px; border-radius: 99px;
      border: 1px solid var(--outline-v);
      background: transparent; color: var(--text-sec);
      font-size: 12.5px; font-family: inherit;
      cursor: pointer; transition: all 0.15s; font-weight: 500;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .filter-chip:hover { background: var(--surface-high); color: var(--on-surface); }
    .filter-chip.active {
      background: var(--primary-fixed); color: var(--on-primary-fixed);
      border-color: var(--primary-fixed);
    }
    .cat-count {
      min-width: 16px; height: 14px; padding: 0 4px;
      border-radius: 99px; font-size: 10px; font-weight: 700;
      background: rgba(255,255,255,0.18); color: inherit; text-align: center;
    }
    .filter-chip.active .cat-count { background: rgba(0,0,0,0.2); }
    html.theme-light .cat-count { background: rgba(0,0,0,0.10); }

    .cat-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 8px; }

    /* Category badge colors */
    .cat-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 99px;
      font-size: 10.5px; font-weight: 600; white-space: nowrap;
    }
    .cat-투자주식 { background:rgba(16,185,129,0.12); color:#10b981; border:1px solid rgba(16,185,129,0.25); }
    .cat-경제거시 { background:rgba(99,102,241,0.12); color:#6366f1; border:1px solid rgba(99,102,241,0.25); }
    .cat-기술산업 { background:rgba(133,173,255,0.12); color:#85adff; border:1px solid rgba(133,173,255,0.25); }
    .cat-부동산   { background:rgba(245,158,11,0.12); color:#f59e0b; border:1px solid rgba(245,158,11,0.25); }
    .cat-시사컬처 { background:rgba(255,111,126,0.12); color:#ff6f7e; border:1px solid rgba(255,111,126,0.25); }
    html.theme-light .cat-기술산업 { background:rgba(37,99,235,0.07); color:#2563eb; border-color:rgba(37,99,235,0.2); }

    /* ============================
       RESULTS INFO
       ============================ */
    .results-info {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px; font-size: 13px; color: var(--text-sec);
    }
    .active-filter-label { font-size: 12px; color: var(--primary-fixed); font-weight: 500; }

    /* ============================
       CARD GRID
       ============================ */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    @media (max-width: 640px) { .card-grid { grid-template-columns: 1fr; } }

    .ka-card {
      position: relative;
      background: var(--surface-high);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 22px;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 10px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s;
      overflow: hidden;
    }
    .ka-card:hover {
      border-color: color-mix(in srgb, var(--card-accent, var(--primary)), transparent 55%);
      box-shadow: 0 8px 32px -8px color-mix(in srgb, var(--card-accent, var(--primary)), transparent 70%);
    }
    .ka-card.is-read { opacity: 0.5; }
    .ka-card.is-read:hover { opacity: 1; }

    /* Top accent stripe */
    .card-stripe {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      border-radius: 14px 14px 0 0;
    }

    /* Read button (shows on hover) */
    .card-read-btn {
      position: absolute; top: 12px; right: 12px; z-index: 2;
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px solid var(--outline-v); background: var(--surface-highest);
      color: var(--text-sec); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; opacity: 0;
    }
    .ka-card:hover .card-read-btn { opacity: 1; }
    .ka-card.is-read .card-read-btn {
      opacity: 1;
      background: #10b981; border-color: #10b981; color: #fff;
    }

    .card-category-row { display: flex; align-items: center; gap: 6px; }
    .card-title {
      font-size: 15px; font-weight: 700;
      letter-spacing: -0.02em; line-height: 1.38;
    }
    .card-subtitle {
      font-size: 11.5px; font-weight: 600;
      color: var(--card-accent, var(--primary));
      letter-spacing: 0.01em;
      margin-top: -4px;
    }
    .card-summary { font-size: 12.5px; color: var(--text-sec); line-height: 1.65; flex: 1; }
    .card-meta {
      display: flex; align-items: center; gap: 5px;
      flex-wrap: wrap; font-size: 11px; margin-top: 2px;
    }
    .card-tag {
      padding: 2px 7px; border-radius: 4px; font-size: 11px;
      background: var(--surface-highest); color: var(--text-sec);
      border: 1px solid var(--border); font-weight: 500;
    }
    .card-date { font-size: 11px; color: var(--text-sec); margin-left: auto; }

    /* Difficulty dot */
    .diff-dot {
      width: 6px; height: 6px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }

    /* ============================
       EMPTY STATE
       ============================ */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-sec);
    }
    .empty-state .e-icon { font-size: 56px; opacity: 0.3; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ============================
       MOBILE BOTTOM NAV
       ============================ */
    .mobile-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-around; align-items: center;
      height: 60px; padding: 0 16px;
      background: color-mix(in srgb, var(--bg), transparent 15%);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
    }
    @media (min-width: 1024px) { .mobile-nav { display: none; } }
    .mobile-nav-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; background: transparent; border: none;
      color: var(--text-sec); cursor: pointer;
      font-size: 10px; font-family: inherit;
      transition: color 0.15s; padding: 4px 12px;
    }
    .mobile-nav-btn.active { color: var(--primary); }
    .mobile-nav-btn .material-symbols-outlined { font-size: 22px; }

    /* ============================
       SWIPE OVERLAY (unchanged)
       ============================ */
    .swipe-overlay {
      display: none; position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,0.96); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-direction: column; align-items: center; justify-content: center;
      padding: 56px 12px 16px;
    }
    .swipe-overlay.active { display: flex; }
    .swipe-top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
    }
    .swipe-counter { font-size: 13px; color: rgba(255,255,255,0.45); font-weight: 600; }
    .swipe-close {
      width: 36px; height: 36px; border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7); cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center; transition: background 0.15s;
    }
    .swipe-close:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .swipe-stage { width: min(860px, 96vw); flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; gap: 0; }
    .swipe-card-wrap {
      flex: 1; width: 100%; min-height: 0;
      position: relative; border-radius: 16px; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.28s;
      will-change: transform, opacity;
    }
    .swipe-frame { width: 100%; height: 100%; border: none; display: block; background: #0a0a0a; }
    .swipe-drag-overlay {
      position: absolute; inset: 0; z-index: 10;
      cursor: grab; touch-action: none; user-select: none;
    }
    .swipe-drag-overlay.is-dragging { cursor: grabbing; }
    .swipe-drag-overlay.pass-through { pointer-events: none; }
    .swipe-loading {
      position: absolute; inset: 0; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; gap: 10px; color: rgba(255,255,255,0.35); font-size: 14px; transition: opacity 0.2s;
    }
    @keyframes swipeSpin { to { transform: rotate(360deg); } }
    .swipe-spinner {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1); border-top-color: rgba(255,255,255,0.55);
      animation: swipeSpin 0.75s linear infinite;
    }
    .swipe-nav { display: flex; align-items: center; gap: 16px; margin-top: 14px; flex-shrink: 0; }
    .swipe-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .swipe-btn:hover { background: rgba(255,255,255,0.14); color: #fff; transform: scale(1.06); }
    .swipe-btn:disabled { opacity: 0.25; cursor: default; transform: none !important; }
    .swipe-dots { display: flex; gap: 6px; align-items: center; }
    .swipe-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.2s; }
    .swipe-dot.active { width: 20px; border-radius: 3px; background: rgba(255,255,255,0.7); }
    .swipe-hint { font-size: 11px; color: rgba(255,255,255,0.22); margin-top: 10px; text-align: center; flex-shrink: 0; }
    .swipe-read-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
    }
    .swipe-read-btn:hover { background: rgba(255,255,255,0.14); color: #fff; transform: scale(1.06); }
    .swipe-read-btn.is-read {
      background: #10b981; border-color: #10b981; color: #fff;
      box-shadow: 0 0 16px rgba(16,185,129,0.4);
    }
    .swipe-read-btn.is-read:hover { background: #059669; border-color: #059669; }

    /* ============================
       ANIMATIONS
       ============================ */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

      btn.setAttribute('aria-label', isRead ? '읽음 해제' : '읽음 표시');
    }
    function toggleSwipeRead() {
      if (!swipeCards.length) return;
      var k = swipeCards[swipeIndex];
      readStatus[k.id] = !readStatus[k.id];
      if (!readStatus[k.id]) delete readStatus[k.id];
      saveReadStatus(); updateSwipeReadBtn(); renderCards(); renderStats();
    }
    function filterRead(val) {
      activeReadFilter = val;
      ['all','unread','read'].forEach(function(v) {
        var el = document.getElementById('readChip-' + v);
        if (el) el.className = 'filter-chip' + (v === val ? ' active' : '');
      });
      renderCards();
    }

    // ============ CATEGORY FILTER ============
    function filterCategory(cat) {
      activeCategory = cat;
      activeTag = 'all';
      renderTagFilters();
      renderCards();
    }

    // ============ RENDER SIDEBAR NAV ============
    var _CATS = [
      { id: 'all',      label: '전체',     icon: 'grid_view',    cls: '' },
      { id: '투자·주식', label: '투자·주식', icon: 'trending_up',  cls: 'cat-투자주식' },
      { id: '경제·거시', label: '경제·거시', icon: 'public',       cls: 'cat-경제거시' },
      { id: '기술·산업', label: '기술·산업', icon: 'memory',       cls: 'cat-기술산업' },
      { id: '부동산',    label: '부동산',   icon: 'apartment',    cls: 'cat-부동산'   },
      { id: '시사·컬처', label: '시사·컬처', icon: 'theater_comedy',cls: 'cat-시사컬처' }
    ];

    function renderSidebarNav(counts, total) {
      var nav = document.getElementById('sidebarNav');
      if (!nav) return;
      var html = '';
      _CATS.forEach(function(c) {
        var cnt = c.id === 'all' ? total : (counts[c.id] || 0);
        var isActive = activeCategory === c.id;
        html += '<button class="sidebar-nav-item' + (isActive ? ' active' : '') + '" onclick="filterCategory(\'' + c.id + '\')" aria-current="' + (isActive ? 'page' : 'false') + '">'
          + '<span class="material-symbols-outlined nav-icon' + (isActive ? ' fill-icon' : '') + '">' + c.icon + '</span>'
          + '<span class="nav-label">' + c.label + '</span>'
          + '<span class="nav-count">' + cnt + '</span>'
          + '</button>';
      });
      nav.innerHTML = html;
    }

    // ============ RENDER CAT FILTER CHIPS (main area) ============
    function renderCatFilters() {
      var counts = {}, total = 0;
      KNOWLEDGE_DB.forEach(function(k) {
        var matchSearch = true;
        if (searchQuery) {
          var q = searchQuery.toLowerCase();
          matchSearch = k.title.toLowerCase().indexOf(q) !== -1
            || k.summary.toLowerCase().indexOf(q) !== -1
            || k.tags.join(' ').toLowerCase().indexOf(q) !== -1
            || k.source.toLowerCase().indexOf(q) !== -1;
        }
        var isRead = !!readStatus[k.id];
        var matchRead = activeReadFilter === 'all'
          || (activeReadFilter === 'read' && isRead)
          || (activeReadFilter === 'unread' && !isRead);
        if (matchSearch && matchRead) {
          counts[k.category] = (counts[k.category] || 0) + 1;
          total++;
        }
      });

      var html = '<span class="filter-label">분류</span>';
      _CATS.forEach(function(c) {
        var cnt = c.id === 'all' ? total : (counts[c.id] || 0);
        var isActive = activeCategory === c.id;
        html += '<button class="filter-chip' + (isActive ? ' active' : '')
          + '" id="catChip-' + c.id + '" onclick="filterCategory(\'' + c.id + '\')">'
          + c.label
          + '<span class="cat-count">' + cnt + '</span>'
          + '</button>';
      });
      document.getElementById('catFilters').innerHTML = html;
      renderSidebarNav(counts, total);
    }

    // ============ RENDER TAG FILTERS ============
    function renderTagFilters() {
      var catFiltered = KNOWLEDGE_DB.filter(function(k) {
        return activeCategory === 'all' || k.category === activeCategory;
      });
      var tagSet = {};
      catFiltered.forEach(function(k) { k.tags.forEach(function(t) { tagSet[t] = true; }); });
      var tags = Object.keys(tagSet).sort();
      if (activeTag !== 'all' && !tagSet[activeTag]) activeTag = 'all';
      var container = document.getElementById('tagFilters');
      var html = '<span class="filter-label">태그</span>';
      html += '<button class="filter-chip' + (activeTag === 'all' ? ' active' : '') + '" onclick="filterTag(\'all\')">전체</button>';
      tags.forEach(function(tag) {
        html += '<button class="filter-chip' + (activeTag === tag ? ' active' : '') + '" onclick="filterTag(\'' + tag + '\')">#' + tag + '</button>';
      });
      container.innerHTML = html;
    }

    // ============ SPLIT TITLE ============
    function splitTitle(title) {
      var sep = title.indexOf(' — ');
      if (sep === -1) sep = title.indexOf(' \u2014 ');
      if (sep === -1) return { main: title, sub: '' };
      return { main: title.slice(0, sep), sub: title.slice(sep + 3) };
    }

    // ============ FILTER ============
    function filterCards() {
      return KNOWLEDGE_DB.filter(function(k) {
        var matchTag    = activeTag === 'all' || k.tags.indexOf(activeTag) !== -1;
        var matchSearch = true;
        if (searchQuery) {
          var q = searchQuery.toLowerCase();
          matchSearch = k.title.toLowerCase().indexOf(q) !== -1
            || k.summary.toLowerCase().indexOf(q) !== -1
            || k.tags.join(' ').toLowerCase().indexOf(q) !== -1
            || k.source.toLowerCase().indexOf(q) !== -1;
        }
        var isRead   = !!readStatus[k.id];
        var matchRead = activeReadFilter === 'all'
          || (activeReadFilter === 'read' && isRead)
          || (activeReadFilter === 'unread' && !isRead);
        var matchCat = activeCategory === 'all' || k.category === activeCategory;
        return matchTag && matchSearch && matchRead && matchCat;
      });
    }

    // ============ RENDER CARDS ============
    function renderCards() {
      var filtered = filterCards();
      var grid     = document.getElementById('cardGrid');
      var empty    = document.getElementById('emptyState');

      if (filtered.length === 0) {
        grid.innerHTML = ''; empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        var _CI = {
          '투자·주식': 'cat-투자주식',
          '경제·거시': 'cat-경제거시',
          '기술·산업': 'cat-기술산업',
          '부동산':    'cat-부동산',
          '시사·컬처': 'cat-시사컬처'
        };
        var _ICONS = {
          '투자·주식': 'trending_up',
          '경제·거시': 'public',
          '기술·산업': 'memory',
          '부동산':    'apartment',
          '시사·컬처': 'theater_comedy'
        };
        var checkSvg = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        var html = '';
        filtered.forEach(function(k, i) {
          var t = splitTitle(k.title);
          var isRead   = !!readStatus[k.id];
          var catCls   = _CI[k.category] || '';
          var catIcon  = _ICONS[k.category] || 'label';
          var tagsHtml = k.tags.slice(0,4).map(function(tag) {
            return '<span class="card-tag">#' + tag + '</span>';
          }).join('');
          var catBadge = k.category
            ? '<span class="cat-badge ' + catCls + '">'
              + '<span class="material-symbols-outlined" style="font-size:11px">' + catIcon + '</span>'
              + k.category + '</span>'
            : '';

          html += '<a href="' + k.file + '" class="ka-card' + (isRead ? ' is-read' : '') + '" role="listitem"'
            + ' style="--card-accent:' + k.color + ';animation-delay:' + (i * 0.04) + 's">'
            + '<div class="card-stripe" style="background:' + k.color + '"></div>'
            + '<button class="card-read-btn" onclick="toggleRead(\'' + k.id + '\', event)" title="' + (isRead ? '읽음 해제' : '읽음 표시') + '" aria-label="' + (isRead ? '읽음 해제' : '읽음 표시') + '">' + checkSvg + '</button>'
            + '<div class="card-category-row">' + catBadge + '</div>'
            + '<div class="card-title">' + t.main + '</div>'
            + (t.sub ? '<div class="card-subtitle">' + t.sub + '</div>' : '')
            + '<div class="card-summary">' + k.summary + '</div>'
            + '<div class="card-meta">' + tagsHtml + '<span class="card-date">' + k.date + '</span></div>'
            + '</a>';
        });
        grid.innerHTML = html;
      }
      document.getElementById('resultsCount').textContent = filtered.length + '개 지식 표시 중';
      renderCatFilters();

      var filterDesc = [];
      if (activeTag !== 'all') filterDesc.push('#' + activeTag);
      if (searchQuery) filterDesc.push('"' + searchQuery + '"');
      document.getElementById('activeFilters').textContent = filterDesc.length ? filterDesc.join(' · ') : '';
    }

    // ============ RENDER STATS ============
    function renderStats() {
      var total   = KNOWLEDGE_DB.length;
      var readCnt = KNOWLEDGE_DB.filter(function(k) { return !!readStatus[k.id]; }).length;
      var pct     = total > 0 ? Math.round(readCnt / total * 100) : 0;

      // Hero section
      var hR = document.getElementById('heroReadCount');
      var hT = document.getElementById('heroTotal');
      var hTB = document.getElementById('heroTotalBig');
      var hP = document.getElementById('heroProgress');
      if (hR)  hR.textContent  = readCnt;
      if (hT)  hT.textContent  = total;
      if (hTB) hTB.textContent = total;
      if (hP)  hP.style.width  = pct + '%';

      // Latest
      if (total > 0) {
        var sorted = KNOWLEDGE_DB.slice().sort(function(a,b) { return b.date.localeCompare(a.date); });
        var latest = sorted[0];
        var t = splitTitle(latest.title);
        var lT = document.getElementById('heroLatestTitle');
        var lD = document.getElementById('heroLatestDate');
        if (lT) lT.textContent = t.main;
        if (lD) lD.textContent = latest.date;
      }

      // Sidebar
      var sT = document.getElementById('sidebarTotal');
      var sR = document.getElementById('sidebarRead');
      var sP = document.getElementById('sidebarProgress');
      if (sT) sT.textContent = total;
      if (sR) sR.textContent = readCnt;
      if (sP) sP.style.width = pct + '%';
    }

    // ============ TAG FILTER ============
    function filterTag(tag) {
      activeTag = tag; renderTagFilters(); renderCards();
    }

    // ============ SEARCH ============
    var searchTimer;
    function onSearchInput(val) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(function() {
        searchQuery = val.trim();
        renderCards();
      }, 200);
    }
    document.getElementById('searchInput').addEventListener('input', function(e) {
      onSearchInput(e.target.value);
      var mob = document.getElementById('searchInputMobile');
      if (mob) mob.value = e.target.value;
    });
    var mobSearch = document.getElementById('searchInputMobile');
    if (mobSearch) {
      mobSearch.addEventListener('input', function(e) {
        onSearchInput(e.target.value);
        document.getElementById('searchInput').value = e.target.value;
      });
    }

    // ============ MOBILE SEARCH TOGGLE ============
    function toggleMobileSearch() {
      var bar = document.getElementById('mobileSearchBar');
      if (!bar) return;
      bar.classList.toggle('visible');
      if (bar.classList.contains('visible')) {
        var inp = document.getElementById('searchInputMobile');
        if (inp) setTimeout(function() { inp.focus(); }, 100);
      }
    }

    // ============ THEME ============
    var currentTheme = 'dark';
    function applyTheme(t) {
      document.getElementById('htmlRoot').className = 'theme-' + t;
      var icon = document.getElementById('themeIcon');
      if (icon) icon.textContent = t === 'dark' ? 'dark_mode' : 'light_mode';
      localStorage.setItem('viz-theme', t);
      currentTheme = t;
    }
    function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    var savedTheme = localStorage.getItem('viz-theme');
    applyTheme(savedTheme || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));

    // ============ SWIPE VIEW ============
    var swipeCards = [], swipeIndex = 0, swipeAnimating = false;

    function openSwipeView() {
      var filtered = filterCards();
      if (filtered.length === 0) return;
      swipeCards = filtered.slice().sort(function() { return Math.random() - 0.5; });
      swipeIndex = 0;
      document.getElementById('swipeOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
      renderSwipeDots(); loadSwipeFrame(null); initSwipeDrag();
    }
    function closeSwipeView() {
      document.getElementById('swipeFrame').src = '';
      document.getElementById('swipeOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }
    function loadSwipeFrame(enterDir) {
      var k     = swipeCards[swipeIndex];
      var wrap  = document.getElementById('swipeCardWrap');
      var frame = document.getElementById('swipeFrame');
      var loader = document.getElementById('swipeLoading');
      loader.style.display = 'flex'; frame.style.opacity = '0';
      if (enterDir) {
        wrap.style.transition = 'none';
        wrap.style.transform  = enterDir === 'next' ? 'translateX(80%) rotate(5deg)' : 'translateX(-80%) rotate(-5deg)';
        wrap.style.opacity    = '0';
        void wrap.offsetWidth;
        wrap.style.transition = ''; wrap.style.transform = ''; wrap.style.opacity = '1';
      }
      frame.onload = function() {
        loader.style.display = 'none'; frame.style.opacity = '1';
        try {
          var iDoc = frame.contentDocument || frame.contentWindow.document;
          iDoc.documentElement.className = 'theme-' + currentTheme;
        } catch(e) {}
      };
      frame.src = k.file;
      document.getElementById('swipeCounter').textContent = (swipeIndex + 1) + ' / ' + swipeCards.length;
      document.getElementById('swipePrevBtn').disabled = swipeIndex === 0;
      document.getElementById('swipeNextBtn').disabled = swipeIndex === swipeCards.length - 1;
      updateSwipeDots(); updateSwipeReadBtn();
    }
    function renderSwipeDots() {
      var dots = document.getElementById('swipeDots');
      var max  = Math.min(swipeCards.length, 9);
      var html = '';
      for (var i = 0; i < max; i++) html += '<div class="swipe-dot' + (i === 0 ? ' active' : '') + '" id="dot-' + i + '"></div>';
      if (swipeCards.length > 9) html += '<div class="swipe-dot" style="opacity:0.35;width:4px">…</div>';
      dots.innerHTML = html;
    }
    function updateSwipeDots() {
      var max = Math.min(swipeCards.length, 9);
      for (var i = 0; i < max; i++) {
        var d = document.getElementById('dot-' + i);
        if (d) d.className = 'swipe-dot' + (i === swipeIndex ? ' active' : '');
      }
    }
    function swipeNext() {
      if (swipeAnimating || swipeIndex >= swipeCards.length - 1) return;
      swipeAnimating = true;
      var wrap = document.getElementById('swipeCardWrap');
      wrap.style.transform = 'translateX(-105%) rotate(-7deg)'; wrap.style.opacity = '0';
      setTimeout(function() { swipeIndex++; loadSwipeFrame('next'); swipeAnimating = false; }, 240);
    }
    function swipePrev() {
      if (swipeAnimating || swipeIndex <= 0) return;
      swipeAnimating = true;
      var wrap = document.getElementById('swipeCardWrap');
      wrap.style.transform = 'translateX(105%) rotate(7deg)'; wrap.style.opacity = '0';
      setTimeout(function() { swipeIndex--; loadSwipeFrame('prev'); swipeAnimating = false; }, 240);
    }

    var swipeDragInited = false;
    function initSwipeDrag() {
      if (swipeDragInited) return;
      swipeDragInited = true;
      var overlay = document.getElementById('swipeDragOverlay');
      var wrap    = document.getElementById('swipeCardWrap');
      var startX = 0, startY = 0, prevY = 0, dragDeltaX = 0;
      var dragging = false, dirLocked = null;
      var LOCK_THRESHOLD = 8, SWIPE_THRESHOLD = 65, TAP_LIMIT = 10;
      function getFrame() { return document.getElementById('swipeFrame'); }
      function onStart(x, y) {
        startX = x; startY = y; prevY = y; dragging = true; dragDeltaX = 0; dirLocked = null;
        overlay.classList.add('is-dragging'); wrap.style.transition = 'none';
      }
      function onMove(x, y) {
        if (!dragging) return;
        var dy = y - prevY; prevY = y; dragDeltaX = x - startX;
        if (!dirLocked) {
          var tdx = Math.abs(dragDeltaX), tdy = Math.abs(y - startY);
          if (tdx > LOCK_THRESHOLD || tdy > LOCK_THRESHOLD) {
            dirLocked = tdx >= tdy ? 'h' : 'v';
            /* 수직 방향 확정 시 overlay pointer-events 해제 → iframe 네이티브 스크롤 위임 */
            if (dirLocked === 'v') overlay.style.pointerEvents = 'none';
          }
        }
        if (dirLocked === 'h') {
          var rot = dragDeltaX * 0.022;
          wrap.style.transform = 'translateX(' + (dragDeltaX * 0.55) + 'px) rotate(' + rot + 'deg)';
        }
        /* dirLocked === 'v': pointer-events:none 이므로 브라우저가 직접 iframe 스크롤 처리 */
      }
      function onEnd() {
        if (!dragging) return;
        dragging = false; overlay.classList.remove('is-dragging'); wrap.style.transition = '';
        overlay.style.pointerEvents = ''; /* pointer-events 복원 */
        var locked = dirLocked, delta = dragDeltaX; dirLocked = null;
        if (locked === 'h') {
          wrap.style.transform = '';
          if (Math.abs(delta) < TAP_LIMIT) {
            overlay.classList.add('pass-through');
            setTimeout(function() { overlay.classList.remove('pass-through'); }, 700);
          } else if (delta < -SWIPE_THRESHOLD) { swipeNext(); }
          else if (delta > SWIPE_THRESHOLD) { swipePrev(); }
        } else if (!locked) {
          wrap.style.transform = '';
          overlay.classList.add('pass-through');
          setTimeout(function() { overlay.classList.remove('pass-through'); }, 700);
        }
      }
      overlay.addEventListener('touchstart', function(e) { onStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
      overlay.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        if (dirLocked === 'h') e.preventDefault();
        onMove(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });
      overlay.addEventListener('touchend', onEnd);
      /* pointer-events:none(수직 스크롤) 상태에서 touchend가 overlay를 통과할 경우를 대비해 document에도 등록 */
      document.addEventListener('touchend', onEnd, { passive: true });
      overlay.addEventListener('mousedown', function(e) { onStart(e.clientX, e.clientY); e.preventDefault(); });
      document.addEventListener('mousemove', function(e) { onMove(e.clientX, e.clientY); });
      document.addEventListener('mouseup', onEnd);
    }

    document.addEventListener('keydown', function(e) {
      var ov = document.getElementById('swipeOverlay');
      if (!ov || !ov.classList.contains('active')) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); swipeNext(); }
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); swipePrev(); }
      if (e.key === 'Escape') closeSwipeView();
    });
    document.getElementById('swipeOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeSwipeView();
    });

    // ============ MOBILE TOPBAR SEARCH VISIBILITY ============
    (function() {
      var toggle = document.getElementById('mobileSearchToggle');
      function checkWidth() {
        if (window.innerWidth < 768) {
          if (toggle) toggle.style.display = 'flex';
        } else {
          if (toggle) toggle.style.display = 'none';
          var bar = document.getElementById('mobileSearchBar');
          if (bar) bar.classList.remove('visible');
        }
      }
      checkWidth();
      window.addEventListener('resize', checkWidth);
    })();

    // ============ INIT ============
    loadReadStatus();
    renderTagFilters();
    renderCatFilters();
    renderStats();
    renderCards();
  </script>
</body>
</html>
